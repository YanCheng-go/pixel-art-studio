<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- 3x3 pixel grid -->
  <rect x="1" y="1" width="8" height="8" fill="#333"/>
  <rect x="10" y="1" width="8" height="8" fill="#00E599"/>
  <rect x="19" y="1" width="8" height="8" fill="#333"/>
  <rect x="1" y="10" width="8" height="8" fill="#00E599" opacity="0.4"/>
  <rect x="10" y="10" width="8" height="8" fill="#444"/>
  <rect x="19" y="10" width="8" height="8" fill="#00E599" opacity="0.7"/>
  <rect x="1" y="19" width="8" height="8" fill="#333"/>
  <rect x="10" y="19" width="8" height="8" fill="#00E599" opacity="0.6"/>
  <rect x="19" y="19" width="8" height="8" fill="#333"/>
  <!-- Pen overlay (bottom-right, angled) -->
  <g transform="translate(16, 12) rotate(-45, 8, 8)">
    <rect x="6" y="0" width="4" height="12" rx="0.5" fill="#e0e0e0"/>
    <polygon points="6,12 10,12 8,16" fill="#00E599"/>
    <rect x="6" y="1" width="4" height="2" rx="0.5" fill="#00E599"/>
  </g>
</svg>
